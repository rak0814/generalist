<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Generalist</title>
  <meta name="description" content="All-in-one utility app">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Phone Frame (PC) ── */
    .app {
      width: 400px;
      height: 92vh;
      max-height: 860px;
      background: #f5f5f5;
      border-radius: 28px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    @media (max-width: 500px) {
      body { background: #f5f5f5; }
      .app {
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* ── Header ── */
    .header {
      background: #111;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header .logo {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
    }

    .header .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      gap: 6px;
    }

    .header-btn {
      width: 34px;
      height: 34px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .header-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── Content Area ── */
    .content-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .content-area iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .content-area iframe.active { display: block; }

    /* ── Home Page ── */
    .home-page {
      padding: 20px;
      height: 100%;
      overflow-y: auto;
    }

    .home-page.hidden { display: none; }

    .greeting {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #111;
    }

    .greeting-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .app-icon .icon-box {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: transform 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .app-icon:active .icon-box { transform: scale(0.9); }

    .app-icon .icon-label {
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.2;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      background: #fff;
      border-top: 1px solid #e8e8e8;
      display: flex;
      flex-shrink: 0;
      padding: 6px 0;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 10;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 0;
      cursor: pointer;
      border: none;
      background: none;
      color: #aaa;
      font-size: 10px;
      transition: color 0.2s;
    }

    .nav-item .nav-icon { font-size: 20px; line-height: 1; }
    .nav-item.active { color: #111; }
    .nav-item:not(.active):hover { color: #666; }

    /* ── Slide Menu ── */
    .menu-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .menu-overlay.open {
      pointer-events: auto;
      opacity: 1;
    }

    .menu-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .menu-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 80%;
      max-width: 320px;
      height: 100%;
      background: #fff;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .menu-overlay.open .menu-panel { transform: translateX(0); }

    .menu-header {
      background: #111;
      color: #fff;
      padding: 28px 24px;
    }

    .menu-header .name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .menu-header .email {
      font-size: 12px;
      color: #999;
    }

    .menu-section {
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .menu-section-title {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 24px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }

    .menu-item:hover { background: #f5f5f5; }
    .menu-item .mi-icon { font-size: 18px; width: 24px; text-align: center; opacity: 0.6; }

    .menu-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Scrollbar ── */
    .home-page::-webkit-scrollbar { width: 4px; }
    .home-page::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">G</div>
      <span class="title">Generalist</span>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="openMenu()" title="메뉴">&#9776;</button>
    </div>
  </div>

  <!-- Content Area -->
  <div class="content-area">

    <!-- Home (inline) -->
    <div class="home-page" id="homePage">
      <p class="greeting">Generalist</p>
      <p class="greeting-sub">All-in-one utility app</p>

      <p class="section-title">AI</p>
      <div class="app-grid">
        <div class="app-icon" onclick="loadPage('ai_chatbot.html','chat')">
          <div class="icon-box" style="background:linear-gradient(135deg,#111,#333);color:#fff;">&#128172;</div>
          <span class="icon-label">AI 채팅</span>
        </div>
        <div class="app-icon" onclick="loadPage('travel_planner.html','travel')">
          <div class="icon-box" style="background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;">&#9992;&#65039;</div>
          <span class="icon-label">여행플래너</span>
        </div>
        <div class="app-icon">
          <div class="icon-box" style="background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;">&#129302;</div>
          <span class="icon-label">준비중</span>
        </div>
        <div class="app-icon">
          <div class="icon-box" style="background:linear-gradient(135deg,#8b5cf6,#a855f7);color:#fff;">&#129302;</div>
          <span class="icon-label">준비중</span>
        </div>
      </div>

      <p class="section-title">Fun</p>
      <div class="app-grid">
        <div class="app-icon" onclick="loadPage('lotto.html','fun')">
          <div class="icon-box" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;">&#127922;</div>
          <span class="icon-label">로또</span>
        </div>
        <div class="app-icon" onclick="loadPage('roulette.html','fun')">
          <div class="icon-box" style="background:linear-gradient(135deg,#ec4899,#f43f5e);color:#fff;">&#127904;</div>
          <span class="icon-label">룰렛</span>
        </div>
        <div class="app-icon" onclick="loadPage('scratch.html','fun')">
          <div class="icon-box" style="background:linear-gradient(135deg,#f59e0b,#eab308);color:#fff;">&#127915;</div>
          <span class="icon-label">복권</span>
        </div>
        <div class="app-icon">
          <div class="icon-box" style="background:linear-gradient(135deg,#64748b,#94a3b8);color:#fff;">&#10010;</div>
          <span class="icon-label">더보기</span>
        </div>
      </div>

      <p class="section-title">Utility</p>
      <div class="app-grid">
        <div class="app-icon" onclick="loadPage('calendar.html','util')">
          <div class="icon-box" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;">&#128197;</div>
          <span class="icon-label">캘린더</span>
        </div>
        <div class="app-icon" onclick="loadPage('memo.html','util')">
          <div class="icon-box" style="background:linear-gradient(135deg,#14b8a6,#10b981);color:#fff;">&#128221;</div>
          <span class="icon-label">메모</span>
        </div>
        <div class="app-icon" onclick="loadPage('timer.html','util')">
          <div class="icon-box" style="background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff;">&#9201;</div>
          <span class="icon-label">타이머</span>
        </div>
        <div class="app-icon">
          <div class="icon-box" style="background:linear-gradient(135deg,#64748b,#94a3b8);color:#fff;">&#10010;</div>
          <span class="icon-label">더보기</span>
        </div>
      </div>
    </div>

    <!-- iframe (sub pages load here) -->
    <iframe id="pageFrame"></iframe>

  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="goHome()">
      <span class="nav-icon">&#127968;</span>
      <span>홈</span>
    </button>
    <button class="nav-item" data-nav="chat" onclick="loadPage('ai_chatbot.html','chat')">
      <span class="nav-icon">&#128172;</span>
      <span>AI 채팅</span>
    </button>
    <button class="nav-item" data-nav="travel" onclick="loadPage('travel_planner.html','travel')">
      <span class="nav-icon">&#9992;&#65039;</span>
      <span>여행</span>
    </button>
    <button class="nav-item" data-nav="favorites" onclick="loadPage('favorites.html','favorites')">
      <span class="nav-icon">&#11088;</span>
      <span>즐겨찾기</span>
    </button>
    <button class="nav-item" data-nav="settings" onclick="loadPage('settings.html','settings')">
      <span class="nav-icon">&#9881;&#65039;</span>
      <span>설정</span>
    </button>
  </div>

  <!-- Slide Menu -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-backdrop" onclick="closeMenu()"></div>
    <div class="menu-panel">
      <div class="menu-header">
        <button class="menu-close" onclick="closeMenu()">&#10005;</button>
        <p class="name">Generalist</p>
        <p class="email">All-in-one utility app</p>
      </div>

      <div class="menu-section">
        <p class="menu-section-title">AI</p>
        <div class="menu-item" onclick="loadPage('ai_chatbot.html','chat'); closeMenu();">
          <span class="mi-icon">&#128172;</span> AI 채팅
        </div>
        <div class="menu-item" onclick="loadPage('travel_planner.html','travel'); closeMenu();">
          <span class="mi-icon">&#9992;&#65039;</span> 여행 플래너
        </div>
      </div>

      <div class="menu-section">
        <p class="menu-section-title">Fun</p>
        <div class="menu-item" onclick="loadPage('lotto.html','fun'); closeMenu();">
          <span class="mi-icon">&#127922;</span> 로또
        </div>
        <div class="menu-item" onclick="loadPage('roulette.html','fun'); closeMenu();">
          <span class="mi-icon">&#127904;</span> 룰렛
        </div>
        <div class="menu-item" onclick="loadPage('scratch.html','fun'); closeMenu();">
          <span class="mi-icon">&#127915;</span> 복권
        </div>
      </div>

      <div class="menu-section">
        <p class="menu-section-title">Utility</p>
        <div class="menu-item" onclick="loadPage('calendar.html','util'); closeMenu();">
          <span class="mi-icon">&#128197;</span> 캘린더
        </div>
        <div class="menu-item" onclick="loadPage('memo.html','util'); closeMenu();">
          <span class="mi-icon">&#128221;</span> 메모
        </div>
        <div class="menu-item" onclick="loadPage('timer.html','util'); closeMenu();">
          <span class="mi-icon">&#9201;</span> 타이머
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-item" onclick="loadPage('settings.html','settings'); closeMenu();">
          <span class="mi-icon">&#9881;&#65039;</span> 설정
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const homePage = document.getElementById('homePage');
  const pageFrame = document.getElementById('pageFrame');
  let currentNav = 'home';

  // ── Load sub-page in iframe ──
  function loadPage(url, nav) {
    homePage.classList.add('hidden');
    pageFrame.classList.add('active');
    pageFrame.src = url;
    setActiveNav(nav);
  }

  // ── Go back to home ──
  function goHome() {
    pageFrame.classList.remove('active');
    pageFrame.src = '';
    homePage.classList.remove('hidden');
    homePage.scrollTop = 0;
    setActiveNav('home');
  }

  // ── Highlight active nav button ──
  function setActiveNav(nav) {
    currentNav = nav;
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.nav === nav);
    });
  }

  // ── Slide Menu ──
  function openMenu() {
    document.getElementById('menuOverlay').classList.add('open');
  }

  function closeMenu() {
    document.getElementById('menuOverlay').classList.remove('open');
  }

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
