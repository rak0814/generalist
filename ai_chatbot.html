<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    .phone-frame { width: 100%; height: 100vh; background: #f5f5f5; display: flex; flex-direction: column; overflow: hidden; }
    header { background: #111; color: #fff; padding: 14px 20px; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    header select { font-size: 12px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; padding: 4px 8px; cursor: pointer; outline: none; }
    header select:hover { border-color: #888; }
    .usage-badge { font-size: 10px; background: #333; padding: 3px 8px; border-radius: 10px; color: #aaa; cursor: pointer; display: none; }
    .usage-badge:hover { background: #444; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .user { align-self: flex-end; background: #111; color: #fff; border-bottom-right-radius: 4px; }
    .ai { align-self: flex-start; background: #fff; color: #111; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
    .ai.error { border-color: #fca5a5; background: #fef2f2; color: #b91c1c; }
    .loading { align-self: flex-start; padding: 12px 16px; font-size: 20px; color: #999; }
    .loading span { animation: blink 1.4s infinite; }
    .loading span:nth-child(2) { animation-delay: .2s; }
    .loading span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity:.2 } 40% { opacity:1 } }
    .input-area { border-top: 1px solid #e0e0e0; background: #fff; padding: 12px 16px; display: flex; gap: 10px; }
    .input-area textarea { flex: 1; resize: none; border: 1px solid #ddd; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; }
    .input-area textarea:focus { border-color: #111; }
    .input-area button { background: #111; color: #fff; border: none; border-radius: 12px; padding: 0 18px; font-size: 14px; cursor: pointer; }
    .input-area button:disabled { opacity: .3; cursor: default; }
    .input-area button:hover:not(:disabled) { background: #333; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 28px; width: 380px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal h2 { font-size: 17px; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: #999; margin-bottom: 14px; }
    .modal input { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; }
    .modal input:focus { border-color: #111; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-btns button { border: none; border-radius: 10px; padding: 9px 18px; font-size: 13px; cursor: pointer; }
    .btn-cancel { background: #f3f4f6; color: #666; }
    .btn-cancel:hover { background: #e5e7eb; }
    .btn-save { background: #111; color: #fff; }
    .btn-save:hover { background: #333; }
    .usage-detail { font-size: 13px; }
    .usage-detail .row { display: flex; justify-content: space-between; padding: 6px 0; }
    .usage-detail .row + .row { border-top: 1px solid #f0f0f0; }
    .usage-detail .label { color: #666; }
    .usage-detail .value { font-weight: 600; font-family: monospace; }
    .usage-detail .section { background: #f9fafb; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .usage-detail .info { background: #eff6ff; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #1d4ed8; }
  </style>
</head>
<body>
<div class="phone-frame">
  <header>
    <select id="modelSelect"></select>
    <span id="usageBadge" class="usage-badge"></span>
    <button onclick="openModal()" style="margin-left:auto; background:#333; border:none; color:#aaa; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer;">API 키 변경</button>
  </header>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="아무 질문이나 입력하세요..."></textarea>
    <button id="sendBtn" onclick="send()" disabled>전송</button>
  </div>
</div>

  <!-- API 키 모달 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>API 키 설정</h2>
      <p>Google AI Studio에서 발급한 키를 입력하세요</p>
      <input type="password" id="keyInput" placeholder="AIzaSy...">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" onclick="saveKey()">저장</button>
      </div>
    </div>
  </div>

  <!-- 사용량 모달 -->
  <div class="modal-overlay" id="usageModal">
    <div class="modal">
      <h2>API 사용량</h2>
      <div id="usageContent" class="usage-detail"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeUsageModal()">닫기</button>
      </div>
    </div>
  </div>

  <script>
    const MODELS = {
      'gemma-3-27b-it':   { name: 'gemma-3-27b',      rpm: 30, rpd: 14400, maxTokens: 8192 },
      'gemini-2.5-flash': { name: 'gemini-2.5-flash',  rpm: 5,  rpd: 20,   maxTokens: 65536 },
      'gemini-3-flash-preview': { name: 'gemini-3-flash',  rpm: 5,  rpd: 20,   maxTokens: 65536 }
    };

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const modal = document.getElementById('modal');
    const keyInput = document.getElementById('keyInput');
    const modelSelect = document.getElementById('modelSelect');
    const usageBadge = document.getElementById('usageBadge');
    const usageModal = document.getElementById('usageModal');
    const usageContent = document.getElementById('usageContent');

    // MODELS 객체 기반으로 드롭다운 자동 생성
    for (const [key, cfg] of Object.entries(MODELS)) {
      const option = document.createElement('option');
      option.value = key;
      option.textContent = cfg.name;
      modelSelect.appendChild(option);
    }

    let MODEL = modelSelect.value;
    function cfg() { return MODELS[MODEL]; }

    // 저장된 모델 복원
    const savedModel = localStorage.getItem('chat_model');
    if (savedModel && MODELS[savedModel]) { MODEL = savedModel; modelSelect.value = savedModel; }
    document.title = cfg().name;

    modelSelect.addEventListener('change', () => {
      MODEL = modelSelect.value;
      localStorage.setItem('chat_model', MODEL);
      document.title = cfg().name;
      history = [];
      const u = getUsage();
      if (u.requests > 0) updateUsageBadge();
      else usageBadge.style.display = 'none';
    });

    let busy = false;
    let history = [];

    function getKey() { return localStorage.getItem('gemini_flash_key') || ''; }

    function openModal() {
      keyInput.value = getKey();
      modal.classList.add('show');
      keyInput.focus();
    }
    function closeModal() { modal.classList.remove('show'); }

    function saveKey() {
      const k = keyInput.value.trim();
      if (!k) return;
      localStorage.setItem('gemini_flash_key', k);
      closeModal();
    }

    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });
    if (!getKey()) openModal();

    /* ── Usage Tracking ── */
    function getTodayKey() { return 'chat_usage_' + MODEL + '_' + new Date().toISOString().slice(0, 10); }
    function getUsage() {
      try { return JSON.parse(localStorage.getItem(getTodayKey())) || { requests: 0, promptTokens: 0, outputTokens: 0, totalTokens: 0 }; }
      catch { return { requests: 0, promptTokens: 0, outputTokens: 0, totalTokens: 0 }; }
    }
    function saveUsage(u) { localStorage.setItem(getTodayKey(), JSON.stringify(u)); }

    function updateUsageBadge() {
      const u = getUsage();
      usageBadge.textContent = `${u.requests}회 · ${u.totalTokens.toLocaleString()} tokens`;
      usageBadge.style.display = 'inline';
    }

    function showUsageDetail() {
      const u = getUsage();
      const c = cfg();
      const remain = Math.max(0, c.rpd - u.requests);
      const pct = Math.min(100, (u.requests / c.rpd) * 100);
      usageContent.innerHTML = `
        <div class="section">
          <div class="row"><span class="label">현재 모델</span><span class="value">${c.name}</span></div>
          <div class="row"><span class="label">최대 출력 토큰</span><span class="value">${c.maxTokens.toLocaleString()}</span></div>
        </div>
        <div class="section">
          <div class="row"><span class="label">오늘 요청</span><span class="value">${u.requests} / ${c.rpd.toLocaleString()}</span></div>
          <div class="row"><span class="label">남은 횟수</span><span class="value" style="color:${remain < 5 ? '#dc2626' : '#16a34a'}">${remain}회</span></div>
          <div class="row"><span class="label">입력 토큰</span><span class="value">${u.promptTokens.toLocaleString()}</span></div>
          <div class="row"><span class="label">출력 토큰</span><span class="value">${u.outputTokens.toLocaleString()}</span></div>
          <div class="row"><span class="label">총 토큰</span><span class="value">${u.totalTokens.toLocaleString()}</span></div>
        </div>
        <div class="info">무료 한도: 분당 ${c.rpm}회, 하루 ${c.rpd.toLocaleString()}회 (자정 초기화)</div>
      `;
      usageModal.classList.add('show');
    }

    function closeUsageModal() { usageModal.classList.remove('show'); }
    usageBadge.addEventListener('click', showUsageDetail);
    usageModal.addEventListener('click', e => { if (e.target === usageModal) closeUsageModal(); });
    if (getUsage().requests > 0) updateUsageBadge();

    /* ── Chat ── */
    input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim() || busy; });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
    });

    function addMsg(text, role) {
      const d = document.createElement('div');
      d.className = 'msg ' + role;
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      return d;
    }

    function addLoading() {
      const d = document.createElement('div');
      d.className = 'loading';
      d.id = 'loader';
      d.innerHTML = '<span>●</span> <span>●</span> <span>●</span>';
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeLoading() { const el = document.getElementById('loader'); if (el) el.remove(); }

    async function send() {
      const text = input.value.trim();
      if (!text || busy) return;
      const key = getKey();
      if (!key) { openModal(); return; }

      busy = true;
      input.value = '';
      sendBtn.disabled = true;
      addMsg(text, 'user');
      addLoading();

      history.push({ role: 'user', parts: [{ text }] });

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`;
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: history,
            generationConfig: { temperature: 0.7, maxOutputTokens: cfg().maxTokens }
          })
        });

        removeLoading();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          const msg = err.error?.message || ('HTTP ' + res.status);
          const d = addMsg('오류: ' + msg, 'ai');
          d.classList.add('error');
          history.pop();
        } else {
          const data = await res.json();
          const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || '(응답 없음)';
          history.push({ role: 'model', parts: [{ text: answer }] });
          addMsg(answer, 'ai');

          // Track usage
          const meta = data.usageMetadata;
          if (meta) {
            const u = getUsage();
            u.requests += 1;
            u.promptTokens += (meta.promptTokenCount || 0);
            u.outputTokens += (meta.candidatesTokenCount || 0);
            u.totalTokens += (meta.totalTokenCount || 0);
            saveUsage(u);
            updateUsageBadge();
          }
        }
      } catch (e) {
        removeLoading();
        const d = addMsg('네트워크 오류: ' + e.message, 'ai');
        d.classList.add('error');
        history.pop();
      }

      busy = false;
      sendBtn.disabled = !input.value.trim();
    }
  </script>
</body>
</html>
